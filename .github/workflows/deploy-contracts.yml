name: Deploy Soroban Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: Stellar CLI network configuration name
        required: true
        default: testnet
        type: string

jobs:
  deploy:
    name: Deploy and initialize contracts
    runs-on: ubuntu-latest
    environment: testnet
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v26.1.0/stellar-cli-26.1.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz
          sudo install -m 755 stellar /usr/local/bin/stellar
      - name: Build and deploy contract pair
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
          STELLAR_NETWORK: ${{ inputs.network }}
        run: ./scripts/deploy-testnet.sh deployment.json
      - name: Publish deployment summary
        run: |
          echo '## Soroban deployment' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat deployment.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: stellar-${{ inputs.network }}-deployment
          path: deployment.json
